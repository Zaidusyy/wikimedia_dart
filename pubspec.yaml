name: wikimedia_dart
description: >-
  A type-safe Dart client for the Wikimedia REST APIs, covering Wikipedia,
  Wiktionary, Commons, and other Wikimedia projects.
version: 0.1.0
homepage: https://github.com/Zaidusyy/wikimedia_dart
repository: https://github.com/Zaidusyy/wikimedia_dart
issue_tracker: https://github.com/Zaidusyy/wikimedia_dart/issues
topics:
  - wikipedia
  - wikimedia
  - mediawiki
  - rest-api

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  http: ^1.2.0
  meta: ^1.12.0

dev_dependencies:
  coverage: ^1.7.0
  lints: ^4.0.0
  test: ^1.24.0
